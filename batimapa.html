<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BatiMapa — BatiSistema</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:grid;grid-template-columns:240px 1fr;grid-template-rows:44px 1fr;font-family:'Exo 2',sans-serif;background:#f0ece4;color:#1a1a2e}
header{grid-column:1/-1;background:#1a237e;color:white;display:flex;align-items:center;
  justify-content:space-between;padding:0 16px;border-bottom:3px solid #c9a227}
.logo{font-family:'Orbitron',monospace;font-size:13px;font-weight:900;letter-spacing:4px;color:#ffd060}
.hinfo{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.4)}
aside{background:#faf7f0;border-right:1px solid #b8b0a0;padding:14px;overflow-y:auto;
  display:flex;flex-direction:column;gap:10px}
.panel{background:#eee8dc;border:1px solid #b8b0a0;border-radius:6px;padding:10px}
.ptitle{font-size:8px;letter-spacing:3px;color:#1a237e;text-transform:uppercase;
  margin-bottom:8px;border-bottom:1px solid #b8b0a0;padding-bottom:5px;font-weight:600}
.upload{border:2px dashed #b8b0a0;border-radius:5px;padding:16px;text-align:center;
  cursor:pointer;background:white;transition:all .2s}
.upload:hover{border-color:#1a237e}
.btn{width:100%;padding:9px;background:#1a237e;color:white;border:none;border-radius:5px;
  font-family:'Orbitron',monospace;font-size:10px;letter-spacing:2px;cursor:pointer;transition:.2s}
.btn:hover{background:#283593}
.btn:disabled{opacity:.4;cursor:not-allowed}
.stat{background:white;border:1px solid #b8b0a0;border-radius:4px;padding:7px;text-align:center}
.sv{font-family:'Orbitron',monospace;font-size:18px;color:#1a237e;font-weight:700}
.sl{font-size:8px;letter-spacing:2px;color:#6a6a7a;margin-top:1px}
.stats2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
select,input[type=range]{width:100%;margin-top:3px;accent-color:#1a237e}
select{background:white;border:1px solid #b8b0a0;border-radius:4px;padding:4px 6px;
  font-size:11px;font-family:'Share Tech Mono',monospace;outline:none}
.ctrl-lbl{font-size:9px;letter-spacing:1px;color:#6a6a7a;margin-bottom:2px}
.legend-item{display:flex;align-items:center;gap:7px;margin-bottom:3px}
.ls{width:22px;height:13px;border-radius:2px;border:1px solid rgba(0,0,0,.1)}
.ll{font-family:'Share Tech Mono',monospace;font-size:10px}
main{position:relative;overflow:hidden}
#map{width:100%;height:100%}
.toggle{position:absolute;top:10px;right:10px;z-index:1000;display:flex;gap:4px;
  background:rgba(255,255,255,.92);border:1px solid #ccc;border-radius:6px;padding:4px;
  box-shadow:0 2px 8px rgba(0,0,0,.15)}
.tbtn{padding:4px 10px;border:none;background:transparent;font-size:10px;
  font-family:'Share Tech Mono',monospace;cursor:pointer;border-radius:4px;color:#1a237e;font-weight:600}
.tbtn.on{background:#1a237e;color:white}
.toast{position:fixed;bottom:16px;right:16px;background:#1a237e;color:white;
  border:1px solid #c9a227;border-radius:6px;padding:8px 14px;font-size:11px;
  font-family:'Share Tech Mono',monospace;opacity:0;transform:translateY(10px);
  transition:all .3s;z-index:9999;pointer-events:none}
.toast.show{opacity:1;transform:none}
</style>
</head>
<body>
<div class="toast" id="toast"></div>

<header>
  <div>
    <div class="logo">🗺 BatiMapa v2</div>
    <div style="font-size:9px;color:rgba(255,255,255,.4);letter-spacing:2px;margin-top:1px">MAPA BASE + BATIMETRÍA — BATISISTEMA</div>
  </div>
  <div class="hinfo" id="hinfo">Sin datos · <a href="hub.html" style="color:#ffd060;text-decoration:none">← HUB</a></div>
</header>

<aside>
  <div class="panel">
    <div class="ptitle">▸ Datos</div>
    <div class="upload" onclick="document.getElementById('fi').click()">
      <div style="font-size:24px;margin-bottom:6px">🗂</div>
      <div style="font-size:10px;color:#6a6a7a;letter-spacing:1px">CARGAR CSV</div>
      <div id="fname" style="font-size:9px;color:#1a237e;margin-top:4px;font-family:'Share Tech Mono',monospace"></div>
    </div>
    <input type="file" id="fi" accept=".csv" style="display:none" onchange="loadCSV(this.files[0])">
  </div>

  <div class="panel">
    <div class="ptitle">▸ Configuración</div>
    <div class="ctrl-lbl">Radio puntos</div>
    <input type="range" id="rslider" min="2" max="12" step="1" value="5"
           oninput="setRadius(this.value)">
    <div class="ctrl-lbl" style="margin-top:8px">Opacidad</div>
    <input type="range" id="oslider" min="0.2" max="1" step="0.05" value="0.85"
           oninput="setOpacity(this.value)">
  </div>

  <div class="panel" id="leg-panel" style="display:none">
    <div class="ptitle">▸ Profundidad (m)</div>
    <div id="legend"></div>
  </div>

  <div class="panel" id="stat-panel" style="display:none">
    <div class="ptitle">▸ Estadísticas</div>
    <div class="stats2" id="stats"></div>
  </div>
</aside>

<main>
  <div id="map"></div>
  <div class="toggle">
    <button class="tbtn on" id="btn-osm"  onclick="setBase('osm')">OSM</button>
    <button class="tbtn"    id="btn-sat"  onclick="setBase('sat')">SAT</button>
    <button class="tbtn"    id="btn-topo" onclick="setBase('topo')">TOPO</button>
  </div>
</main>

<script>
// ─── MAPA ─────────────────────────────────────────────────────────────────────
const map = L.map('map',{center:[-34.40,-58.50],zoom:13});
const BASES = {
  osm:  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
  sat:  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
  topo: 'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'
};
let base = L.tileLayer(BASES.osm,{maxZoom:20,attribution:'© OpenStreetMap'}).addTo(map);
let ptsLayer = null;
let allPts = [], zMn=0, zMx=1;

function setBase(tipo){
  map.removeLayer(base);
  base = L.tileLayer(BASES[tipo],{maxZoom:20}).addTo(map);
  base.bringToBack();
  ['osm','sat','topo'].forEach(t=>{
    document.getElementById('btn-'+t).className='tbtn'+(t===tipo?' on':'');
  });
}

// ─── PALETA ───────────────────────────────────────────────────────────────────
const PAL=[[210,240,215],[150,220,210],[90,190,225],[50,150,210],[25,110,190],[10,70,160],[4,40,120],[1,18,70]];
function palRGB(t){
  t=Math.max(0,Math.min(1,t));
  const n=PAL.length-1,i=Math.floor(t*n),f=t*n-i;
  const a=PAL[Math.min(i,n)],b=PAL[Math.min(i+1,n)];
  return[Math.round(a[0]+(b[0]-a[0])*f),Math.round(a[1]+(b[1]-a[1])*f),Math.round(a[2]+(b[2]-a[2])*f)];
}
function palCSS(t){const[r,g,b]=palRGB(t);return'rgb('+r+','+g+','+b+')';}

// ─── CARGA CSV ────────────────────────────────────────────────────────────────
function loadCSV(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=e=>{
    const rows=d3.csvParse(e.target.result);
    const UC=rows.columns.map(c=>c.trim().toUpperCase());
    const fc=(...ns)=>{for(const n of ns){const i=UC.findIndex(c=>c===n||c.includes(n));if(i>=0)return rows.columns[i];}return null;};
    const latC=fc('LATITUD','LAT'),lonC=fc('LONGITUD','LON'),prC=fc('FINAL_M','FINAL','PROF_M','PROF','Z');
    if(!latC||!lonC||!prC){toast('Sin LAT/LON/PROF',true);return;}
    const pts=[];
    rows.forEach(row=>{
      const lat=parseFloat(row[latC]),lon=parseFloat(row[lonC]),z=parseFloat(row[prC]);
      if(!isNaN(lat)&&!isNaN(lon)&&!isNaN(z)&&z>0)pts.push({lat,lon,z});
    });
    if(!pts.length){toast('Sin puntos válidos',true);return;}
    allPts=pts;
    zMn=d3.min(pts,p=>p.z);
    zMx=d3.max(pts,p=>p.z);
    document.getElementById('fname').textContent=file.name+' ('+pts.length+' pts)';
    document.getElementById('hinfo').innerHTML=pts.length+' SONDAJES | '+zMn.toFixed(2)+'m — '+zMx.toFixed(2)+'m | <a href="hub.html" style="color:#ffd060;text-decoration:none">← HUB</a>';
    dibujar();
    buildLegend();
    buildStats(pts);
    document.getElementById('leg-panel').style.display='';
    document.getElementById('stat-panel').style.display='';
    toast('✓ '+file.name+' — '+pts.length+' puntos');
  };
  r.readAsText(file);
}

function dibujar(){
  if(ptsLayer)map.removeLayer(ptsLayer);
  const radio=parseInt(document.getElementById('rslider').value)||5;
  const opac=parseFloat(document.getElementById('oslider').value)||0.85;
  const zR=zMx-zMn||1;
  ptsLayer=L.layerGroup();
  allPts.forEach(p=>{
    const t=(p.z-zMn)/zR;
    L.circleMarker([p.lat,p.lon],{
      radius:radio,
      fillColor:palCSS(t),
      color:'white',
      weight:1.2,
      fillOpacity:opac
    }).bindTooltip(p.z.toFixed(2)+'m',{permanent:false,direction:'top'})
    .addTo(ptsLayer);
  });
  ptsLayer.addTo(map);
  // Centrar en los datos
  const lats=allPts.map(p=>p.lat),lons=allPts.map(p=>p.lon);
  map.fitBounds([[Math.min(...lats),Math.min(...lons)],[Math.max(...lats),Math.max(...lons)]],
    {padding:[30,30]});
}

function setRadius(v){if(allPts.length)dibujar();}
function setOpacity(v){if(allPts.length)dibujar();}

function buildLegend(){
  const el=document.getElementById('legend');el.innerHTML='';
  const intv=0.5,zR=zMx-zMn||1;
  d3.range(Math.ceil(zMn/intv)*intv,zMx+intv,intv).forEach(z=>{
    const t=(z-zMn)/zR;
    const d=document.createElement('div');d.className='legend-item';
    d.innerHTML='<div class="ls" style="background:'+palCSS(t)+'"></div>'+
      '<div class="ll">'+z.toFixed(2)+'m</div>';
    el.appendChild(d);
  });
}

function buildStats(pts){
  const el=document.getElementById('stats');el.innerHTML='';
  [{v:pts.length,l:'PUNTOS'},{v:d3.mean(pts,p=>p.z).toFixed(2)+'m',l:'MEDIA'},
   {v:zMn.toFixed(2)+'m',l:'MÍN'},{v:zMx.toFixed(2)+'m',l:'MÁX'}]
  .forEach(s=>{
    const b=document.createElement('div');b.className='stat';
    b.innerHTML='<div class="sv">'+s.v+'</div><div class="sl">'+s.l+'</div>';
    el.appendChild(b);
  });
}

let tT;
function toast(msg,err=false){
  const t=document.getElementById('toast');t.textContent=msg;
  t.className='toast show'+(err?' err':'');
  clearTimeout(tT);tT=setTimeout(()=>t.className='toast',3000);
}
</script>
</body>
</html>
